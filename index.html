:root {
  --slide-duration: 10s;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #000;
  font-family: 'DM Sans', sans-serif;
  color: #fff;
}

/* ── SLIDE CONTAINER ── */
#slideshow {
  width: 100vw; height: 100vh;
  position: relative;
}

.slide {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  text-align: center;
  opacity: 0;
  transition: opacity 0.8s ease;
  padding: 80px;
}

.slide.active  { opacity: 1; z-index: 2; }
.slide.exiting { opacity: 0; z-index: 1; }

/* ── NOISE OVERLAY ── */
.slide::before {
  content: '';
  position: absolute; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  background-size: 200px;
  pointer-events: none;
  z-index: 10;
  opacity: 0.5;
}

/* ── ANNOUNCEMENT SLIDE ── */
.slide-announcement .tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  opacity: 0.5;
  margin-bottom: 32px;
}

.slide-announcement h1 {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(3rem, 8vw, 7rem);
  line-height: 1.05;
  margin-bottom: 32px;
  max-width: 14ch;
}

.slide-announcement p {
  font-size: clamp(1.2rem, 2.5vw, 2rem);
  font-weight: 300;
  max-width: 36ch;
  line-height: 1.6;
  opacity: 0.85;
}

.accent-line {
  width: 80px; height: 3px;
  border-radius: 2px;
  margin: 40px auto;
}

/* ── IMAGE SLIDE ── */
.slide-image .bg-image {
  position: absolute; inset: 0;
  background-size: cover;
  background-position: center;
  filter: brightness(0.45);
  z-index: 0;
}

.slide-image .content {
  position: relative; z-index: 2;
}

.slide-image h2 {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(2.5rem, 6vw, 6rem);
  margin-bottom: 16px;
}

.slide-image p {
  font-size: clamp(1rem, 2vw, 1.5rem);
  opacity: 0.8;
  max-width: 40ch;
  margin: 0 auto;
}

/* ── WEATHER SLIDE ── */
.slide-weather .weather-icon {
  font-size: 120px;
  line-height: 1;
  margin-bottom: 24px;
  filter: drop-shadow(0 0 30px rgba(255,255,255,0.2));
}

.slide-weather .temp {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(5rem, 15vw, 14rem);
  line-height: 0.9;
  letter-spacing: -0.04em;
}

.slide-weather .desc {
  font-size: clamp(1.2rem, 2.5vw, 2rem);
  font-weight: 300;
  opacity: 0.7;
  margin-top: 16px;
  text-transform: capitalize;
}

.slide-weather .location-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.85rem;
  letter-spacing: 0.2em;
  opacity: 0.4;
  margin-top: 24px;
  text-transform: uppercase;
}

.weather-row {
  display: flex; gap: 48px;
  margin-top: 32px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 1rem;
  opacity: 0.6;
}

/* ── CLOCK SLIDE ── */
.slide-clock .time-display {
  font-family: 'JetBrains Mono', monospace;
  font-size: clamp(5rem, 18vw, 18rem);
  font-weight: 300;
  letter-spacing: -0.05em;
  line-height: 0.9;
}

.slide-clock .date-display {
  font-family: 'DM Sans', sans-serif;
  font-size: clamp(1.2rem, 3vw, 2.5rem);
  font-weight: 300;
  opacity: 0.55;
  margin-top: 32px;
  letter-spacing: 0.08em;
}

/* ── PROGRESS BAR ── */
#progress-bar {
  position: fixed;
  bottom: 0; left: 0;
  height: 3px;
  background: rgba(255,255,255,0.6);
  z-index: 100;
  transform-origin: left;
  width: 0;
}

/* ── SLIDE COUNTER ── */
#counter {
  position: fixed;
  bottom: 20px; right: 24px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  opacity: 0.25;
  letter-spacing: 0.1em;
  z-index: 100;
}

/* ── RELOAD NOTICE (debug) ── */
#reload-badge {
  position: fixed;
  top: 16px; right: 16px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.6rem;
  opacity: 0.15;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  z-index: 100;
}

/* Entry animation */
@keyframes slideUp {
  from { transform: translateY(30px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}

.slide.active .anim {
  animation: slideUp 0.7s cubic-bezier(0.22,1,0.36,1) both;
}
.slide.active .anim:nth-child(2) { animation-delay: 0.1s; }
.slide.active .anim:nth-child(3) { animation-delay: 0.2s; }
.slide.active .anim:nth-child(4) { animation-delay: 0.3s; }

<body>

<div id="slideshow"></div>
<div id="progress-bar"></div>
<div id="counter"></div>
<div id="reload-badge">Auto-syncing</div>

<script>
// ── CONFIG ──────────────────────────────────────────────
const SLIDE_DURATION_MS = 10000;  // 10 seconds per slide
const RELOAD_AFTER_CYCLES = 10;   // reload page every N full cycles (picks up JSON changes)
const WEATHER_CACHE_MIN   = 10;   // re-fetch weather every N minutes

// ── STATE ───────────────────────────────────────────────
let slides = [];
let current = 0;
let timer = null;
let progressRaf = null;
let cycleCount = 0;
let weatherCache = {};

// ── BOOT ────────────────────────────────────────────────
async function boot() {
  try {
    slides = await fetchSlides();
    if (!slides || slides.length === 0) throw new Error('No slides found in slides.json');
    buildSlides();
    showSlide(0);
  } catch(e) {
    document.getElementById('slideshow').innerHTML = `
      <div style="position:fixed;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;background:#1a0a0a;font-family:monospace;padding:40px;text-align:center;">
        <div style="font-size:3rem;margin-bottom:24px;">⚠️</div>
        <div style="font-size:1.4rem;color:#ff6b6b;margin-bottom:16px;">Failed to load slides</div>
        <div style="font-size:0.9rem;color:#aaa;max-width:60ch;line-height:1.6;">${e.message}</div>
      </div>`;
  }
}

async function fetchSlides() {
  const r = await fetch(`slides.json?_=${Date.now()}`);
  if (!r.ok) throw new Error(`HTTP ${r.status} fetching slides.json`);
  const text = await r.text();
  try {
    return JSON.parse(text);
  } catch(e) {
    throw new Error(`JSON parse error: ${e.message} — Content received: ${text.substring(0, 200)}`);
  }
}

// ── BUILD DOM ───────────────────────────────────────────
function buildSlides() {
  const container = document.getElementById('slideshow');
  container.innerHTML = '';
  slides.forEach((s, i) => {
    const el = document.createElement('div');
    el.className = `slide slide-${s.type}`;
    el.id = `slide-${i}`;
    el.style.background = s.bg || '#111';
    el.innerHTML = renderSlide(s);
    container.appendChild(el);
  });
}

function renderSlide(s) {
  switch (s.type) {
    case 'announcement': return `
      <div class="tag anim">Announcement</div>
      <h1 class="anim">${s.title}</h1>
      <div class="accent-line anim" style="background:${s.accent || '#fff'}"></div>
      <p class="anim">${s.body}</p>`;

    case 'image': return `
      <div class="bg-image" style="background-image:url('${s.image}')"></div>
      <div class="content">
        <h2 class="anim">${s.title}</h2>
        ${s.caption ? `<p class="anim">${s.caption}</p>` : ''}
      </div>`;

    case 'weather': return `
      <div class="weather-icon anim" id="wx-icon-${s.lat}">⏳</div>
      <div class="temp anim" id="wx-temp-${s.lat}">—</div>
      <div class="desc anim" id="wx-desc-${s.lat}">Loading weather…</div>
      <div class="location-label anim">${s.location || ''}</div>
      <div class="weather-row anim">
        <span id="wx-hum-${s.lat}">Humidity —</span>
        <span id="wx-wind-${s.lat}">Wind —</span>
      </div>`;

    case 'clock': return `
      <div class="time-display anim" id="clock-time" data-tz="${s.timezone || 'local'}">—</div>
      <div class="date-display anim" id="clock-date">—</div>`;

    default: return `<h1>${s.title || 'Slide'}</h1>`;
  }
}

// ── SLIDESHOW ───────────────────────────────────────────
function showSlide(idx) {
  // Clear previous
  document.querySelectorAll('.slide.active').forEach(el => {
    el.classList.remove('active');
    el.classList.add('exiting');
    setTimeout(() => el.classList.remove('exiting'), 900);
  });

  current = idx;
  const el = document.getElementById(`slide-${idx}`);
  el.classList.add('active');
  updateCounter();
  startProgress();

  const s = slides[idx];
  if (s.type === 'weather') loadWeather(s);

  clearTimeout(timer);
  timer = setTimeout(nextSlide, SLIDE_DURATION_MS);
}

function nextSlide() {
  let next = current + 1;
  if (next >= slides.length) {
    next = 0;
    cycleCount++;
    if (cycleCount >= RELOAD_AFTER_CYCLES) location.reload();
  }
  showSlide(next);
}

// ── PROGRESS BAR ────────────────────────────────────────
function startProgress() {
  const bar = document.getElementById('progress-bar');
  cancelAnimationFrame(progressRaf);
  const start = performance.now();
  function tick(now) {
    const pct = Math.min((now - start) / SLIDE_DURATION_MS * 100, 100);
    bar.style.width = pct + '%';
    if (pct < 100) progressRaf = requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

// ── COUNTER ─────────────────────────────────────────────
function updateCounter() {
  document.getElementById('counter').textContent = `${current + 1} / ${slides.length}`;
}

// ── CLOCK ───────────────────────────────────────────────
function tickClock() {
  const timeEl = document.getElementById('clock-time');
  const dateEl = document.getElementById('clock-date');
  if (!timeEl) return;

  const tz = timeEl.dataset.tz;
  const opts = tz && tz !== 'local' ? { timeZone: tz } : {};

  const now = new Date();
  timeEl.textContent = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false, ...opts });
  dateEl.textContent = now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', ...opts });
}
setInterval(tickClock, 1000);

// ── WEATHER ─────────────────────────────────────────────
const WX_ICONS = {
  0:'☀️',1:'🌤',2:'⛅',3:'☁️',
  45:'🌫',48:'🌫',
  51:'🌦',53:'🌦',55:'🌧',
  61:'🌧',63:'🌧',65:'🌧',
  71:'🌨',73:'🌨',75:'❄️',
  80:'🌦',81:'🌧',82:'🌧',
  95:'⛈',96:'⛈',99:'⛈'
};

async function loadWeather(s) {
  const key = `${s.lat},${s.lon}`;
  const now = Date.now();
  if (weatherCache[key] && now - weatherCache[key].ts < WEATHER_CACHE_MIN * 60000) {
    applyWeather(s, weatherCache[key].data);
    return;
  }
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${s.lat}&longitude=${s.lon}&current=temperature_2m,weathercode,relativehumidity_2m,windspeed_10m&temperature_unit=fahrenheit&windspeed_unit=mph`;
    const res = await fetch(url);
    const data = await res.json();
    weatherCache[key] = { ts: now, data };
    applyWeather(s, data);
  } catch(e) {
    document.getElementById(`wx-desc-${s.lat}`).textContent = 'Weather unavailable';
  }
}

function applyWeather(s, data) {
  const c = data.current;
  document.getElementById(`wx-icon-${s.lat}`).textContent = WX_ICONS[c.weathercode] || '🌡️';
  document.getElementById(`wx-temp-${s.lat}`).textContent = Math.round(c.temperature_2m) + '°';
  document.getElementById(`wx-desc-${s.lat}`).textContent = wmoDesc(c.weathercode);
  document.getElementById(`wx-hum-${s.lat}`).textContent  = `Humidity ${c.relativehumidity_2m}%`;
  document.getElementById(`wx-wind-${s.lat}`).textContent = `Wind ${Math.round(c.windspeed_10m)} mph`;
}

function wmoDesc(code) {
  const map = {
    0:'Clear sky',1:'Mainly clear',2:'Partly cloudy',3:'Overcast',
    45:'Foggy',48:'Icy fog',51:'Light drizzle',53:'Drizzle',55:'Heavy drizzle',
    61:'Slight rain',63:'Moderate rain',65:'Heavy rain',
    71:'Slight snow',73:'Moderate snow',75:'Heavy snow',
    80:'Slight showers',81:'Moderate showers',82:'Violent showers',
    95:'Thunderstorm',96:'Thunderstorm with hail',99:'Heavy thunderstorm'
  };
  return map[code] || 'Unknown conditions';
}

// ── GO ───────────────────────────────────────────────────
boot();
</script>

</body>
</html>
