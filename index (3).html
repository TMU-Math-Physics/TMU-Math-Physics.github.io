<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hallway Display</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'DM Sans', sans-serif;
      color: #fff;
    }

    #slideshow {
      width: 100vw; height: 100vh;
      position: relative;
    }

    .slide {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      text-align: center;
      opacity: 0;
      transition: opacity 0.8s ease;
      padding: 80px;
      overflow: hidden;
    }

    .slide.active  { opacity: 1; z-index: 2; }
    .slide.exiting { opacity: 0; z-index: 1; }

    /* Noise overlay for styled slides */
    .slide.noise::before {
      content: '';
      position: absolute; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 200px;
      pointer-events: none;
      z-index: 10;
      opacity: 0.5;
    }

    /* ────────────────────────────────────────
       ANNOUNCEMENT
    ──────────────────────────────────────── */
    .slide-announcement .tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem; letter-spacing: 0.25em;
      text-transform: uppercase; opacity: 0.5; margin-bottom: 32px;
    }
    .slide-announcement h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(3rem, 8vw, 7rem);
      line-height: 1.05; margin-bottom: 32px; max-width: 14ch;
    }
    .slide-announcement p {
      font-size: clamp(1.2rem, 2.5vw, 2rem);
      font-weight: 300; max-width: 36ch; line-height: 1.6; opacity: 0.85;
    }
    .accent-line {
      width: 80px; height: 3px; border-radius: 2px; margin: 40px auto;
    }

    /* ────────────────────────────────────────
       WEATHER
    ──────────────────────────────────────── */
    .slide-weather .weather-icon {
      font-size: 120px; line-height: 1; margin-bottom: 24px;
      filter: drop-shadow(0 0 30px rgba(255,255,255,0.2));
    }
    .slide-weather .temp {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(5rem, 15vw, 14rem);
      line-height: 0.9; letter-spacing: -0.04em;
    }
    .slide-weather .desc {
      font-size: clamp(1.2rem, 2.5vw, 2rem); font-weight: 300;
      opacity: 0.7; margin-top: 16px; text-transform: capitalize;
    }
    .slide-weather .location-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem; letter-spacing: 0.2em;
      opacity: 0.4; margin-top: 24px; text-transform: uppercase;
    }
    .weather-row {
      display: flex; gap: 48px; margin-top: 32px;
      font-family: 'JetBrains Mono', monospace; font-size: 1rem; opacity: 0.6;
    }

    /* ────────────────────────────────────────
       CLOCK
    ──────────────────────────────────────── */
    .slide-clock .time-display {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(5rem, 18vw, 18rem);
      font-weight: 300; letter-spacing: -0.05em; line-height: 0.9;
    }
    .slide-clock .date-display {
      font-size: clamp(1.2rem, 3vw, 2.5rem); font-weight: 300;
      opacity: 0.55; margin-top: 32px; letter-spacing: 0.08em;
    }

    /* ────────────────────────────────────────
       PDF
    ──────────────────────────────────────── */
    .slide-pdf { padding: 0; }
    .slide-pdf iframe {
      width: 100%; height: 100%; border: none; display: block;
    }

    /* ────────────────────────────────────────
       PURE IMAGE
    ──────────────────────────────────────── */
    .slide-pure-image { padding: 0; }
    .slide-pure-image img {
      width: 100%; height: 100%;
      object-fit: contain; display: block;
    }
    .slide-pure-image.cover img { object-fit: cover; }

    /* ────────────────────────────────────────
       FACULTY PROFILE
    ──────────────────────────────────────── */
    .slide-faculty {
      flex-direction: row; text-align: left;
      padding: 0; align-items: stretch;
    }
    .faculty-photo-panel {
      width: 42%; flex-shrink: 0;
      position: relative; overflow: hidden;
    }
    .faculty-photo-panel img {
      width: 100%; height: 100%;
      object-fit: cover; object-position: center top; display: block;
    }
    .faculty-photo-panel .photo-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to right, transparent 65%, var(--slide-bg, #111) 100%);
    }
    .faculty-photo-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.04);
      font-size: 8rem; opacity: 0.3;
    }
    .faculty-info-panel {
      flex: 1; display: flex; flex-direction: column;
      justify-content: center; padding: 64px 72px 64px 56px;
    }
    .faculty-dept {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem; letter-spacing: 0.25em;
      text-transform: uppercase; opacity: 0.45; margin-bottom: 20px;
    }
    .faculty-name {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2.5rem, 5vw, 5rem); line-height: 1.05; margin-bottom: 8px;
    }
    .faculty-title {
      font-size: clamp(1rem, 1.8vw, 1.4rem); opacity: 0.55; margin-bottom: 36px;
    }
    .faculty-accent { width: 60px; height: 3px; border-radius: 2px; margin-bottom: 36px; }
    .faculty-bio {
      font-size: clamp(0.95rem, 1.6vw, 1.25rem); font-weight: 300;
      line-height: 1.75; opacity: 0.8; max-width: 44ch;
    }
    .faculty-tags { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 32px; }
    .faculty-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 6px 14px; border-radius: 100px;
      border: 1px solid rgba(255,255,255,0.2); opacity: 0.65;
    }
    .faculty-email {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem; opacity: 0.35; margin-top: 28px; letter-spacing: 0.05em;
    }

    /* ────────────────────────────────────────
       RESEARCH POSTER
    ──────────────────────────────────────── */
    .slide-poster {
      flex-direction: column; text-align: left;
      padding: 0; align-items: stretch;
    }
    .poster-header {
      padding: 32px 60px 24px; border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }
    .poster-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem; letter-spacing: 0.3em;
      text-transform: uppercase; opacity: 0.35; margin-bottom: 10px;
    }
    .poster-title {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(1.6rem, 3vw, 3rem); line-height: 1.15; max-width: 72ch;
    }
    .poster-authors {
      font-size: clamp(0.8rem, 1.2vw, 1rem); opacity: 0.45;
      margin-top: 8px; font-style: italic;
    }
    .poster-body {
      flex: 1; display: grid; gap: 1px;
      background: rgba(255,255,255,0.06); overflow: hidden;
    }
    .poster-body.cols-1 { grid-template-columns: 1fr; }
    .poster-body.cols-2 { grid-template-columns: 1fr 1fr; }
    .poster-body.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
    .poster-body.has-image { grid-template-columns: 1fr 1.3fr; }
    .poster-section {
      padding: 32px 44px; background: var(--slide-bg, #111);
      display: flex; flex-direction: column;
    }
    .poster-section-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem; letter-spacing: 0.2em;
      text-transform: uppercase; opacity: 0.38; margin-bottom: 14px;
    }
    .poster-section-body {
      font-size: clamp(0.9rem, 1.35vw, 1.1rem); font-weight: 300;
      line-height: 1.8; opacity: 0.85;
    }
    .poster-image-section { background: #000; overflow: hidden; }
    .poster-image-section img {
      width: 100%; height: 100%; object-fit: contain; display: block;
    }

    /* ────────────────────────────────────────
       PUBLICATION
    ──────────────────────────────────────── */
    .slide-publication {
      flex-direction: row; text-align: left; padding: 0; align-items: stretch;
    }
    .pub-sidebar {
      width: 10px; flex-shrink: 0;
      background: var(--pub-accent, #e94560);
    }
    .pub-main {
      flex: 1; display: flex; flex-direction: column;
      justify-content: center; padding: 72px 56px 72px 72px;
    }
    .pub-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem; letter-spacing: 0.3em; text-transform: uppercase;
      color: var(--pub-accent, #e94560); opacity: 0.9; margin-bottom: 28px;
    }
    .pub-title {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(1.8rem, 4vw, 3.8rem);
      line-height: 1.12; max-width: 26ch; margin-bottom: 32px;
    }
    .pub-author {
      font-size: clamp(1rem, 1.8vw, 1.4rem); font-weight: 500;
      opacity: 0.9; margin-bottom: 8px;
    }
    .pub-journal {
      font-size: clamp(0.85rem, 1.4vw, 1.15rem); font-style: italic;
      font-weight: 300; opacity: 0.5; margin-bottom: 6px;
    }
    .pub-year {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem; letter-spacing: 0.1em; opacity: 0.32; margin-bottom: 36px;
    }
    .pub-abstract {
      font-size: clamp(0.85rem, 1.35vw, 1.05rem); font-weight: 300;
      line-height: 1.8; opacity: 0.65; max-width: 52ch;
    }
    /* QR panel on the right */
    .pub-qr-panel {
      width: 260px; flex-shrink: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 48px 36px;
      border-left: 1px solid rgba(255,255,255,0.07);
      gap: 18px;
    }
    .pub-qr-box {
      width: 172px; height: 172px;
      background: #fff; border-radius: 10px;
      padding: 10px; display: flex;
      align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .pub-qr-box canvas { display: block; }
    .pub-qr-scan {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.62rem; letter-spacing: 0.15em;
      text-transform: uppercase; opacity: 0.3; text-align: center;
    }
    .pub-qr-doi {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.58rem; opacity: 0.22; text-align: center;
      word-break: break-all; max-width: 172px; line-height: 1.5;
    }

    /* ────────────────────────────────────────
       UI CHROME
    ──────────────────────────────────────── */
    #progress-bar {
      position: fixed; bottom: 0; left: 0;
      height: 3px; background: rgba(255,255,255,0.55);
      z-index: 100; width: 0;
    }
    #counter {
      position: fixed; bottom: 20px; right: 24px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem; opacity: 0.22; letter-spacing: 0.1em; z-index: 100;
    }
    #reload-badge {
      position: fixed; top: 16px; right: 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem; opacity: 0.13;
      letter-spacing: 0.15em; text-transform: uppercase; z-index: 100;
    }

    @keyframes slideUp {
      from { transform: translateY(28px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .slide.active .anim { animation: slideUp 0.7s cubic-bezier(0.22,1,0.36,1) both; }
    .slide.active .anim:nth-child(2) { animation-delay: 0.08s; }
    .slide.active .anim:nth-child(3) { animation-delay: 0.16s; }
    .slide.active .anim:nth-child(4) { animation-delay: 0.24s; }
    .slide.active .anim:nth-child(5) { animation-delay: 0.32s; }
    .slide.active .anim:nth-child(6) { animation-delay: 0.40s; }
  </style>
</head>
<body>

<div id="slideshow"></div>
<div id="progress-bar"></div>
<div id="counter"></div>
<div id="reload-badge">Auto-syncing</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
// ── CONFIG ───────────────────────────────────────────────
const DEFAULT_DURATION_MS = 10000;
const RELOAD_AFTER_CYCLES = 10;
const WEATHER_CACHE_MIN   = 10;

// ── STATE ────────────────────────────────────────────────
let slides = [];
let current = 0;
let timer = null;
let progressRaf = null;
let cycleCount = 0;
let weatherCache = {};

// ── BOOT ─────────────────────────────────────────────────
async function boot() {
  try {
    slides = await fetchSlides();
    if (!slides || slides.length === 0) throw new Error('No slides found in slides.json');
    buildSlides();
    showSlide(0);
  } catch(e) {
    document.getElementById('slideshow').innerHTML = `
      <div style="position:fixed;inset:0;display:flex;flex-direction:column;justify-content:center;
                  align-items:center;background:#1a0a0a;font-family:monospace;padding:40px;text-align:center;">
        <div style="font-size:3rem;margin-bottom:24px;">⚠️</div>
        <div style="font-size:1.4rem;color:#ff6b6b;margin-bottom:16px;">Failed to load slides</div>
        <div style="font-size:0.9rem;color:#aaa;max-width:60ch;line-height:1.6;">${e.message}</div>
      </div>`;
  }
}

async function fetchSlides() {
  const r = await fetch(`slides.json?_=${Date.now()}`);
  if (!r.ok) throw new Error(`HTTP ${r.status} fetching slides.json`);
  const text = await r.text();
  try { return JSON.parse(text); }
  catch(e) { throw new Error(`JSON parse error: ${e.message} — received: ${text.substring(0, 200)}`); }
}

// ── BUILD DOM ────────────────────────────────────────────
function buildSlides() {
  const container = document.getElementById('slideshow');
  container.innerHTML = '';
  slides.forEach((s, i) => {
    const el = document.createElement('div');
    el.className = `slide slide-${s.type}`;
    // Add noise texture to styled (non-media) slides
    if (['announcement','weather','clock','faculty','poster','publication'].includes(s.type)) {
      el.classList.add('noise');
    }
    if (s.type === 'pure-image' && s.fit === 'cover') el.classList.add('cover');
    el.id = `slide-${i}`;
    el.style.background = s.bg || '#111';
    el.style.setProperty('--slide-bg', s.bg || '#111');
    if (s.type === 'publication') el.style.setProperty('--pub-accent', s.accent || '#e94560');
    el.innerHTML = renderSlide(s);
    container.appendChild(el);
  });
}

function renderSlide(s) {
  switch (s.type) {

    // ── Announcement ──────────────────────────────────────
    case 'announcement': return `
      <div class="tag anim">${s.tag || 'Announcement'}</div>
      <h1 class="anim">${s.title}</h1>
      <div class="accent-line anim" style="background:${s.accent || '#fff'}"></div>
      <p class="anim">${s.body}</p>`;

    // ── Weather ───────────────────────────────────────────
    case 'weather': return `
      <div class="weather-icon anim" id="wx-icon-${s.lat}">⏳</div>
      <div class="temp anim" id="wx-temp-${s.lat}">—</div>
      <div class="desc anim" id="wx-desc-${s.lat}">Loading weather…</div>
      <div class="location-label anim">${s.location || ''}</div>
      <div class="weather-row anim">
        <span id="wx-hum-${s.lat}">Humidity —</span>
        <span id="wx-wind-${s.lat}">Wind —</span>
      </div>`;

    // ── Clock ─────────────────────────────────────────────
    case 'clock': return `
      <div class="time-display anim" id="clock-time" data-tz="${s.timezone || 'local'}">—</div>
      <div class="date-display anim" id="clock-date">—</div>`;

    // ── PDF ───────────────────────────────────────────────
    case 'pdf': return `
      <iframe src="${s.src}#toolbar=0&navpanes=0&scrollbar=0&view=FitH"
              title="${s.title || 'PDF'}"></iframe>`;

    // ── Pure Image ────────────────────────────────────────
    case 'pure-image': return `
      <img src="${s.src}" alt="${s.alt || ''}" />`;

    // ── Faculty Profile ───────────────────────────────────
    case 'faculty': return `
      <div class="faculty-photo-panel anim">
        ${s.photo
          ? `<img src="${s.photo}" alt="${s.name}" />`
          : `<div class="faculty-photo-placeholder">👤</div>`}
        <div class="photo-overlay"></div>
      </div>
      <div class="faculty-info-panel">
        <div class="faculty-dept anim">${s.department || 'Faculty'}</div>
        <div class="faculty-name anim">${s.name}</div>
        <div class="faculty-title anim">${s.title || ''}</div>
        <div class="faculty-accent anim" style="background:${s.accent || '#fff'}"></div>
        ${s.bio    ? `<div class="faculty-bio anim">${s.bio}</div>` : ''}
        ${s.interests && s.interests.length ? `
          <div class="faculty-tags anim">
            ${s.interests.map(t => `<span class="faculty-tag">${t}</span>`).join('')}
          </div>` : ''}
        ${s.email  ? `<div class="faculty-email anim">${s.email}</div>` : ''}
      </div>`;

    // ── Research Poster ───────────────────────────────────
    case 'poster': {
      const secs = s.sections || [];
      const hasImg = !!s.image;
      const colClass = s.columns
        ? `cols-${s.columns}`
        : hasImg ? 'has-image'
        : secs.length <= 1 ? 'cols-1'
        : secs.length === 2 ? 'cols-2' : 'cols-3';
      return `
        <div class="poster-header">
          <div class="poster-label">${s.label || 'Research'}</div>
          <div class="poster-title">${s.title}</div>
          ${s.authors ? `<div class="poster-authors">${s.authors}</div>` : ''}
        </div>
        <div class="poster-body ${colClass}">
          ${secs.map(sec => `
            <div class="poster-section">
              <div class="poster-section-title">${sec.heading}</div>
              <div class="poster-section-body">${sec.body}</div>
            </div>`).join('')}
          ${hasImg ? `
            <div class="poster-image-section">
              <img src="${s.image}" alt="${s.title}" />
            </div>` : ''}
        </div>`;
    }

    // ── Publication ───────────────────────────────────────
    case 'publication': {
      const qrId = `qr-${Math.random().toString(36).slice(2)}`;
      // Schedule QR generation after DOM is inserted
      if (s.url) setTimeout(() => generateQR(qrId, s.url), 50);
      return `
        <div class="pub-sidebar"></div>
        <div class="pub-main">
          <div class="pub-label anim">✦ New Publication</div>
          <div class="pub-title anim">${s.title}</div>
          <div class="pub-author anim">${s.author}</div>
          <div class="pub-journal anim">${s.journal}</div>
          ${s.year ? `<div class="pub-year anim">${s.year}</div>` : ''}
          ${s.abstract ? `<div class="pub-abstract anim">${s.abstract}</div>` : ''}
        </div>
        ${s.url ? `
        <div class="pub-qr-panel">
          <div class="pub-qr-box"><canvas id="${qrId}"></canvas></div>
          <div class="pub-qr-scan">Scan to read</div>
          ${s.doi ? `<div class="pub-qr-doi">${s.doi}</div>` : ''}
        </div>` : ''}`;
    }

    default: return `<h1 style="font-family:'DM Serif Display',serif;font-size:4rem">${s.title || 'Slide'}</h1>`;
  }
}

// ── SLIDESHOW ────────────────────────────────────────────
function slideDuration(s) {
  return (s.duration != null ? s.duration : 10) * 1000;
}

function showSlide(idx) {
  document.querySelectorAll('.slide.active').forEach(el => {
    el.classList.remove('active');
    el.classList.add('exiting');
    setTimeout(() => el.classList.remove('exiting'), 900);
  });

  current = idx;
  const el = document.getElementById(`slide-${idx}`);
  el.classList.add('active');
  updateCounter();

  const s = slides[idx];
  startProgress(slideDuration(s));
  if (s.type === 'weather') loadWeather(s);

  clearTimeout(timer);
  timer = setTimeout(nextSlide, slideDuration(s));
}

function nextSlide() {
  let next = current + 1;
  if (next >= slides.length) {
    next = 0;
    cycleCount++;
    if (cycleCount >= RELOAD_AFTER_CYCLES) { location.reload(); return; }
  }
  showSlide(next);
}

// ── PROGRESS BAR ─────────────────────────────────────────
function startProgress(duration) {
  const bar = document.getElementById('progress-bar');
  cancelAnimationFrame(progressRaf);
  const start = performance.now();
  function tick(now) {
    const pct = Math.min((now - start) / duration * 100, 100);
    bar.style.width = pct + '%';
    if (pct < 100) progressRaf = requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

// ── COUNTER ──────────────────────────────────────────────
function updateCounter() {
  document.getElementById('counter').textContent = `${current + 1} / ${slides.length}`;
}

// ── CLOCK ────────────────────────────────────────────────
function tickClock() {
  const timeEl = document.getElementById('clock-time');
  const dateEl = document.getElementById('clock-date');
  if (!timeEl) return;
  const tz = timeEl.dataset.tz;
  const opts = tz && tz !== 'local' ? { timeZone: tz } : {};
  const now = new Date();
  timeEl.textContent = now.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false, ...opts });
  dateEl.textContent = now.toLocaleDateString('en-US',  { weekday:'long', year:'numeric', month:'long', day:'numeric', ...opts });
}
setInterval(tickClock, 1000);

// ── WEATHER ──────────────────────────────────────────────
const WX_ICONS = {
  0:'☀️',1:'🌤',2:'⛅',3:'☁️',45:'🌫',48:'🌫',
  51:'🌦',53:'🌦',55:'🌧',61:'🌧',63:'🌧',65:'🌧',
  71:'🌨',73:'🌨',75:'❄️',80:'🌦',81:'🌧',82:'🌧',
  95:'⛈',96:'⛈',99:'⛈'
};

async function loadWeather(s) {
  const key = `${s.lat},${s.lon}`;
  const now = Date.now();
  if (weatherCache[key] && now - weatherCache[key].ts < WEATHER_CACHE_MIN * 60000) {
    applyWeather(s, weatherCache[key].data); return;
  }
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${s.lat}&longitude=${s.lon}&current=temperature_2m,weathercode,relativehumidity_2m,windspeed_10m&temperature_unit=fahrenheit&windspeed_unit=mph`;
    const data = await (await fetch(url)).json();
    weatherCache[key] = { ts: now, data };
    applyWeather(s, data);
  } catch(e) {
    const el = document.getElementById(`wx-desc-${s.lat}`);
    if (el) el.textContent = 'Weather unavailable';
  }
}

function applyWeather(s, data) {
  const c = data.current;
  document.getElementById(`wx-icon-${s.lat}`).textContent = WX_ICONS[c.weathercode] || '🌡️';
  document.getElementById(`wx-temp-${s.lat}`).textContent = Math.round(c.temperature_2m) + '°';
  document.getElementById(`wx-desc-${s.lat}`).textContent = wmoDesc(c.weathercode);
  document.getElementById(`wx-hum-${s.lat}`).textContent  = `Humidity ${c.relativehumidity_2m}%`;
  document.getElementById(`wx-wind-${s.lat}`).textContent = `Wind ${Math.round(c.windspeed_10m)} mph`;
}

function wmoDesc(code) {
  const map = {
    0:'Clear sky',1:'Mainly clear',2:'Partly cloudy',3:'Overcast',
    45:'Foggy',48:'Icy fog',51:'Light drizzle',53:'Drizzle',55:'Heavy drizzle',
    61:'Slight rain',63:'Moderate rain',65:'Heavy rain',
    71:'Slight snow',73:'Moderate snow',75:'Heavy snow',
    80:'Slight showers',81:'Moderate showers',82:'Violent showers',
    95:'Thunderstorm',96:'Thunderstorm with hail',99:'Heavy thunderstorm'
  };
  return map[code] || 'Unknown conditions';
}

// ── QR CODE ──────────────────────────────────────────────
// Tiny self-contained QR encoder using qrcodejs (loaded from CDN)
function generateQR(canvasId, url) {
  const canvas = document.getElementById(canvasId);
  if (!canvas || !window.QRCode) return;
  // Clear any previous content
  canvas.width = 152; canvas.height = 152;
  new QRCode(canvas.parentElement, {
    text: url,
    width: 152, height: 152,
    colorDark: '#000000',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.M
  });
  // qrcodejs inserts an img; remove the canvas placeholder
  canvas.remove();
}

// ── GO ───────────────────────────────────────────────────
boot();
</script>
